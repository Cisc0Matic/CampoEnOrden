<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Listado de Labores</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div *ngIf="loading" class="ion-text-center">
    <ion-spinner name="crescent"></ion-spinner>
    <p>Cargando labores...</p>
  </div>

  <div *ngIf="error" class="ion-text-center ion-padding">
    <ion-icon name="warning-outline" color="danger" size="large"></ion-icon>
    <p class="ion-text-danger">{{ error }}</p>
    <ion-button (click)="loadLabores()" expand="block" fill="outline" color="danger">Reintentar</ion-button>
  </div>

  <ion-list *ngIf="!loading && !error && labores.length > 0">
    <ion-item-sliding *ngFor="let labor of labores">
      <ion-item>
        <ion-label>
          <h2>{{ labor.tipo_aplicacion }}</h2>
          <p>Fecha: {{ labor.fecha | date:'dd/MM/yyyy' }}</p>
          <p>Costo: {{ labor.costo | currency:'USD':'symbol':'1.2-2' }}</p>
          <p *ngIf="labor.observaciones">Obs: {{ labor.observaciones }}</p>
        </ion-label>
      </ion-item>
      <ion-item-options side="end">
        <ion-item-option color="primary" (click)="editLabor(labor.id)">
          <ion-icon slot="icon-only" name="create"></ion-icon>
        </ion-item-option>
        <ion-item-option color="danger" (click)="deleteLabor(labor.id)">
          <ion-icon slot="icon-only" name="trash"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>

  <div *ngIf="!loading && !error && labores.length === 0" class="ion-text-center ion-padding">
    <ion-icon name="information-circle-outline" color="medium" size="large"></ion-icon>
    <p>No hay labores registradas aún.</p>
    <ion-button (click)="addLabor()" expand="block">Agregar Nueva Labor</ion-button>
  </div>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed" *ngIf="!loading && !error">
    <ion-fab-button (click)="addLabor()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
