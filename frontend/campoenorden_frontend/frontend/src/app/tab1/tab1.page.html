<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>CampoEnOrden</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="logout()">
        <ion-icon slot="icon-only" name="log-out-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="mosaic-content">
  <div class="welcome-section">
    <h2>Bienvenido</h2>
    <p>Seleccione una opción para comenzar</p>
  </div>

  <div class="mosaic-grid">
    <div 
      *ngFor="let item of mosaicItems" 
      class="mosaic-tile"
      [style.background-color]="item.color"
      (click)="navigateTo(item.route)">
      <div class="mosaic-icon">
        <ion-icon [name]="getIconName(item.icon)" aria-hidden="true"></ion-icon>
      </div>
      <div class="mosaic-content">
        <h3 class="mosaic-title">{{ item.title }}</h3>
        <p class="mosaic-description">{{ item.description }}</p>
      </div>
    </div>
  </div>

  <div class="quick-stats">
    <h3>Resumen del día</h3>
    <div class="stats-grid">
      <div class="stat-card">
        <ion-icon name="checkmark-circle" color="success"></ion-icon>
        <div class="stat-info">
          <span class="stat-value">0</span>
          <span class="stat-label">Labores completadas</span>
        </div>
      </div>
      <div class="stat-card">
        <ion-icon name="time" color="warning"></ion-icon>
        <div class="stat-info">
          <span class="stat-value">0</span>
          <span class="stat-label">En progreso</span>
        </div>
      </div>
      <div class="stat-card">
        <ion-icon name="alert-circle" color="danger"></ion-icon>
        <div class="stat-info">
          <span class="stat-value">0</span>
          <span class="stat-label">Pendientes</span>
        </div>
      </div>
    </div>
  </div>
</ion-content>
